overwrite: true
hooks:
  afterAllFileWrite:
    - tslint --fix
    - prettier --write
generates:
  src/_generated/doc-resolvers.ts:
    schema: "http://localhost:14013/graphql"
    plugins:
      - typescript
      - typescript-resolvers
    config:
      useIndexSignature: false
      namingConvention:
        typeNames: change-case#pascalCase
        transformUnderscore: true
  src/_generated/doc-contents-resolvers.ts:
    schema: "http://localhost:14014/graphql"
    plugins:
      - typescript
      - typescript-resolvers
    config:
      useIndexSignature: false
      namingConvention:
        typeNames: change-case#pascalCase
        transformUnderscore: true
